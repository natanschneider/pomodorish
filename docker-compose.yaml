services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pomodorish-app
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - pomodorish-network

networks:
  pomodorish-network:
    driver: bridge
